<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Animation</title>
  <style>
    /* Reset margins and ensure full viewport height */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1a1a1a; /* Dark background */
      display: flex;
      justify-content: center; /* Center horizontally */
      align-items: center; /* Center vertically */
      overflow: hidden;
    }

    /* Container for the animated icon */
    .icon-wrapper {
      font-size: 8rem; /* Large icon size */
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite; /* Continuous pulsing animation */
    }

    /* Keyframes for the pulsing effect */
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.3);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="icon-wrapper">
    🖕
  </div>

</body>
</html>
